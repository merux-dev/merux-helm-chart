apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-nats
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
        - name: nats
          image: {{ .Values.images.nats }}
          command: ["nats-server", "-c", "/etc/nats.conf"]
          ports:
            - containerPort: 4222
          volumeMounts:
            - name: config
              mountPath: /etc/nats.conf
              subPath: nats.conf
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-config
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-nats
spec:
  selector:
    app: nats
  ports:
    - port: 4222
      targetPort: 4222