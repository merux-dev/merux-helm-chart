janus:
  enabled: false
  image: "canyan/janus-gateway:latest"
  pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    wsPort: 8188
    httpPort: 8088

signaling:
  enabled: true
  image: "strukturag/nextcloud-spreed-signaling:d82f7f2"
  pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8080

  mcu:
    type: janus
    url: "janus.example.com"
  
  turn:
    server: "turn.example.com"
    secret: "your-coturn-secret"

  backend:
    url: "https://nextcloud.yourdomain.com"
    secret: "your-nextcloud-shared-secret"
    
  sessions:
    # Hashkey must be 32 or 64 bytes
    hashkey: "your-session-hash-key-here"
    # Blockkey must be exactly 16, 24, or 32 bytes
    blockkey: "your-session-block-key-here"

nats:
  enabled: true
  image: "nats:alpine"
  pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 4222

ingress:
  enabled: true
  className: "nginx" # Change this if you use traefik, haproxy, etc.
  annotations: {}
    # Example for cert-manager:
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # nginx.ingress.kubernetes.io/proxy-body-size: "50m"
  hosts:
    - host: signaling.yourdomain.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: signaling-tls
  #    hosts:
  #      - signaling.yourdomain.com